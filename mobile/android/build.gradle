allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.ext.compileSdkVersion = 34
rootProject.ext.minSdkVersion = 24
rootProject.ext.targetSdkVersion = 34

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

subprojects {
    project.configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'com.android.support'
                    && !details.requested.name.contains('multidex')) {
                details.useVersion "28.0.0"
            }
        }
    }
}

rootProject.ext.flutter = [
    compileSdkVersion: 35,
    minSdkVersion: 24,
    targetSdkVersion: 35,
]

// Global enforcement of SDK versions for all plugins
allprojects {
    project.ext.compileSdkVersion = 35
    project.ext.minSdkVersion = 24
    project.ext.targetSdkVersion = 35
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
